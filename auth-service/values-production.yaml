replicaCount: 2

image:
  tag: production-auth-v2.0.0

env:
  DATABASE_URL: ""

deployment:
  minReadySeconds: 10
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  maxUnavailable: 1
