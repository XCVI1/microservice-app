name: Core-service CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'core-v*'
    paths:
      - 'core-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'core-service/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: "pip"

      - name: Install requirements
        run: pip install -r core-service/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run lint
        run: ruff check core-service

      - name: Run format check
        run: ruff format --check core-service

      - name: Install and run mypy
        run: |
          pip install mypy
          cd core-service
          mypy app

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint ./core-service

      - name: Create render directory
        run: mkdir -p helm-render

      - name: Render helm templates
        run: |
          helm template core-service ./core-service > helm-render/core-service-base.yaml
          helm template core-service ./core-service -f core-service/values-staging.yaml > helm-render/core-service-staging.yaml
          helm template core-service ./core-service -f core-service/values-production.yaml > helm-render/core-service-production.yaml

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: helm-render

      - name: Bandit scan security
        run: |
          pip install bandit
          bandit -r core-service/app

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pytest:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r core-service/requirements-dev.txt -r core-service/requirements.txt

      - name: Run tests
        run: pytest core-service/tests/

  build-staging:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push core-service (staging)
        uses: docker/build-push-action@v7
        with:
          context: ./core-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/core-service:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/core-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-production:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push core-service (production)
        uses: docker/build-push-action@v7
        with:
          context: ./core-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/core-service:production
            ${{ secrets.DOCKERHUB_USERNAME }}/core-service:production-${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-staging:
    runs-on: ubuntu-latest
    needs: build-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Scan staging image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/core-service:staging
          format: table
          exit-code: 1
          severity: CRITICAL

  security-production:
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Scan production image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/core-service:production-${{ github.ref_name }}
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy-staging:
    runs-on: ubuntu-latest
    needs: security-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag for ArgoCD
        run: |
          sed -i "s/tag: staging.*/tag: staging/" core-service/values-staging.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add core-service/values-staging.yaml
          git commit -m "ci: trigger staging deployment" || echo "No changes"
          git push

  deploy-production:
    runs-on: ubuntu-latest
    needs: security-production
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tag for ArgoCD
        run: |
          sed -i "s/tag: production.*/tag: production-${{ github.ref_name }}/" core-service/values-production.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add core-service/values-production.yaml
          git commit -m "ci: update auth-service image tag to production-${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Core service deployed to production.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Core-service deployment failed.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Create github release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

