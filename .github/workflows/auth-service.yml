name: auth-service CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'auth-v*'
    paths:
      - 'auth-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r auth-service/requirements.txt

      - name: Install ruff linter
        run: pip install ruff

      - name: Run lint
        run: ruff check auth-service

      - name: Run format check
        run: ruff format --check auth-service

      - name: Install and run mypy
        run: |
          pip install mypy
          cd auth-service
          mypy app

      - name: Bandit scan security
        run: |
          pip install bandit
          bandit -r auth-service/app

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pytest:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r auth-service/requirements-dev.txt

      - name: Run tests
        run: pytest auth-service/tests/

  build-staging:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push auth-service (staging)
        uses: docker/build-push-action@v7
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-production:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push auth-service (production)
        uses: docker/build-push-action@v7
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:production
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:production-${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-staging:
    runs-on: ubuntu-latest
    needs: build-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Scan staging image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:staging
          format: table
          exit-code: 1
          severity: CRITICAL

  security-production:
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Scan production image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:production-${{ github.ref_name }}
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy-staging:
    runs-on: ubuntu-latest
    needs: security-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config

      - name: Deploy auth-service with helm
        run: |
          helm upgrade --install auth-service ./auth-service \
            --namespace default \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/auth-service \
            --set image.tag=staging \
            --values ./auth-service/values-staging.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/auth-service-auth-service --timeout=120s
  
  deploy-production:
    runs-on: ubuntu-latest
    needs: security-production
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" > ~/.kube/config

      - name: Deploy auth-service with helm
        run: |
          helm upgrade --install auth-service ./auth-service \
            --namespace default \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/auth-service \
            --set image.tag=production-${{ github.ref_name }} \
            --values ./auth-service/values-production.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/auth-service-auth-service --timeout=120s

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Auth service deployed to production.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Auth-service deployment failed.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Create github release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
