name: auth-service CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'auth-v*'
    paths:
      - 'auth-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r auth-service/requirements.txt

      - name: Install ruff linter
        run: pip install ruff

      - name: Run lint
        run: ruff check auth-service

      - name: Run format check
        run: ruff format --check auth-service

      - name: Install and run mypy
        run: |
          pip install mypy
          cd auth-service
          mypy app

      - name: Bandit scan security
        run: |
          pip install bandit
          bandit -r auth-service/app

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pytest:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r auth-service/requirements-dev.txt

      - name: Run tests
        run: pytest auth-service/tests/

  build-and-push:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up docker image
        id: tag
        run: |
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF_TYPE == tag ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Run scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy-staging:
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Copy docker-compose.yml and nginx.conf
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST_STAGING }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'docker-compose.yml,api-gateway/nginx.conf'
          target: "~/microservice"
      
      - name: Backup current image tag
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_STAGING }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/microservice

            CURRENT=$(docker inspect auth-service --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo $CURRENT > ~/microservice/backups/.backup_auth_image
            echo "Backed up: $CURRENT"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_STAGING }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/microservice
            docker network inspect microservice-net >/dev/null 2>&1 || docker network create microservice-net
            
            # Healthcheck
            wait_healthy() {
              local url=$1
              for i in $(seq 1 10); do
                echo "Attempt $i: checking $url"
                curl -f -s -o /dev/null "$url" && return 0
                sleep 5
              done
              return 1
            }

            PREVIOUS=$(cat ~/microservice/backups/.backup_auth_image 2>/dev/null || echo "")

            # Deploy to server
            docker compose pull
            docker compose up -d
            docker compose exec auth-service alembic upgrade head

            if ! wait_healthy http://localhost:8080/health/auth; then
              echo "Healthcheck failed, rolling back"
              if [ -n "$PREVIOUS" ]; then
                docker compose down
                docker pull "$PREVIOUS"
                docker compose up -d
                wait_healthy http://localhost:8080/health/auth || { echo "Rollback failed"; exit 1; }
                echo "Rolled back to $PREVIOUS"
              else
                echo "No previous image, deploy failed"
                exit 1
              fi
            fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Copy docker-compose.yml and nginx.conf
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'docker-compose.yml,api-gateway/nginx.conf'
          target: "~/microservice"
      
      - name: Backup current image tag
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/microservice

            CURRENT=$(docker inspect auth-service --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo $CURRENT > ~/microservice/backups/.backup_auth_image
            echo "Backed up: $CURRENT"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -ei
            cd ~/microservice
            docker network inspect microservice-net >/dev/null 2>&1 || docker network create microservice-net

            # Healthcheck
            wait_healthy() {
              local url=$1
              for i in $(seq 1 10); do
                echo "Attempt $i: checking $url"
                curl -f -s -o /dev/null "$url" && return 0
                sleep 5
              done
              return 1
            }

            PREVIOUS=$(cat ~/microservice/backups/.backup_auth_image 2>/dev/null || echo "")

            # Deploy to server
            docker compose pull
            docker compose up -d
            docker compose exec auth-service alembic upgrade head


            if ! wait_healthy http://localhost:8080/health/auth; then
              echo "Healthcheck failed, rolling back"
              if [ -n "$PREVIOUS" ]; then
                docker compose down
                docker pull "$PREVIOUS"
                docker compose up -d
                wait_healthy http://localhost:8080/health/auth || { echo "Rollback failed"; exit 1; }
                echo "Rolled back to $PREVIOUS"
              else
                echo "No previous image, deploy failed"
                exit 1
              fi
            fi

      - name: Notify Telegram on success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Auth service deployed to production.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Auth-service deployment failed.
            - Commit: `${{ github.sha }}`
            - Link: [View Workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Create github release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
