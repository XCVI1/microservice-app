apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/XCVI1/microservice-app
    targetRevision: HEAD
    path: core-service
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
