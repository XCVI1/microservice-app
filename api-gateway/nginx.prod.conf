events {
    worker_connections 1024;
}

http {
    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    upstream auth_service {
        server auth-service:8001;
    }

    upstream core_service {
        server core-service:8002;
    }

    server {
        listen 80;
        server_name gateway-micr.duckdns.org;

        # Для обновления сертификатов certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name gateway-micr.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/gateway-micr.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gateway-micr.duckdns.org/privkey.pem;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Healthcheck
        location / {
            return 200 "API Gateway is running";
        }

        # AUTH SERVICE
        location /api/v1/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # CORE SERVICE
        location /api/v1/ {
            proxy_pass http://core_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
