replicaCount: 2

image:
  repository: danyafi/api-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  host: gateway-micr.duckdns.org
  tlsSecret: gateway-cert

nginxConfig: |
  events {}

  http {
    server {
      listen 80;

      location = / {
        return 200 "API Gateway is running";
      }

      location /api/v1/auth/ {
        proxy_pass http://auth-service:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
      }

      location /api/v1/core/ {
        proxy_pass http://core-service:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
      }
    }
  }

