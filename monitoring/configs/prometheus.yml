global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'core-service'
    static_configs:
      - targets: ['core-service:8002']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']
