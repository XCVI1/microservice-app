- name: Install base packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Check docker GPG keys
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /usr/share/keyrings/docker.gpg
    mode: "0644"

- name: Convert Docker GPG key to keyring format
  command: >
    gpg --dearmor --yes
    --output /usr/share/keyrings/docker-archive-keyring.gpg
    /usr/share/keyrings/docker.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: Remove old docker repository if exsist
  file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

- name: Add docker repository
  apt_repository:
    repo: 'deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable'
    state: present
    filename: docker
    update_cache: yes

- name: Install docker and docker compose
  apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  notify:
    - restart docker

- name: Add user to docker group
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes

- name: Enable docker
  systemd:
    name: docker
    state: started
    enabled: yes
